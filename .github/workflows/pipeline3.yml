name: Production Ready CI/CD v3 - Best Practices

on:
  workflow_dispatch

env:
  IMAGE_NAME: "nginx-enterprise"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================================
  # JOB 1: PROVISIONAMENTO DINÂMICO
  # ==========================================
  infra-provisioning:
    name: Provisionamento Automatizado v3
    runs-on: ubuntu-latest
    outputs:
      acr_server: ${{ steps.tf-outputs.outputs.acr_server }}
      acr_username: ${{ steps.tf-outputs.outputs.acr_username }}

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configurar Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # O Init consome as variáveis globais do repositório
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
          -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE }}" \
          -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
          -backend-config="key=terraform3.tfstate"
      working-directory: ./terraform3

    # O Apply injeta as variáveis do GitHub para dentro do variables.tf do Terraform
    - name: Terraform Apply
      run: |
        terraform apply -auto-approve -input=false \
          -var="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}" \
          -var="cluster_name=${{ vars.AZURE_CLUSTER_NAME }}" \
          -var="key_vault_name=${{ vars.KEY_VAULT_NAME }}"
      working-directory: ./terraform3

    - name: Exportar Outputs
      id: tf-outputs
      run: |
        echo "acr_server=$(terraform output -raw acr_server)" >> $GITHUB_OUTPUT
        echo "acr_username=$(terraform output -raw acr_username)" >> $GITHUB_OUTPUT
      working-directory: ./terraform3

  # ==========================================
  # JOB 2: BUILD E SEGURANÇA (MÁSCARA COMPLETA)
  # ==========================================
  build-and-security:
    name: Build Docker & Scan com Trivy
    runs-on: ubuntu-latest
    needs: infra-provisioning
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Coletar Senha do ACR via Azure CLI
      id: get-secret
      run: |
        ACR_PASS=$(az keyvault secret show --vault-name ${{ vars.KEY_VAULT_NAME }} --name acr-admin-password --query value -o tsv)
        echo "::add-mask::$ACR_PASS"
        echo "acr_password=$ACR_PASS" >> $GITHUB_OUTPUT

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Gerar Dockerfile base (Nginx v3)
      run: |
        echo "FROM nginx:alpine" > Dockerfile
        echo "RUN echo '<h1>Lab 3: Esteira Masterizada com Melhores Práticas do Mercado!</h1>' > /usr/share/nginx/html/index.html" >> Dockerfile

    - name: Build local da imagem
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

    - name: Scan de Vulnerabilidades (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL'

    - name: Login no Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: ${{ needs.infra-provisioning.outputs.acr_server }}
        username: ${{ needs.infra-provisioning.outputs.acr_username }}
        password: ${{ steps.get-secret.outputs.acr_password }}

    - name: Tag e Push da imagem para o ACR
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        docker push ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  # ==========================================
  # JOB 3: DEPLOY NO KUBERNETES DINÂMICO
  # ==========================================
  deploy-to-aks:
    name: Deploy no Azure AKS v3
    runs-on: ubuntu-latest
    needs: [infra-provisioning, build-and-security]
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configurar contexto do AKS
      uses: azure/aks-set-context@v4
      with:
        resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ vars.AZURE_CLUSTER_NAME }}

    - name: Implantar Manifestos no Cluster
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx-app-v3
          labels:
            app: nginx-v3
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: nginx-v3
          template:
            metadata:
              labels:
                app: nginx-v3
            spec:
              containers:
              - name: nginx-container
                image: ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: nginx-service-v3
        spec:
          type: LoadBalancer
          ports:
          - port: 80
            targetPort: 80
          selector:
            app: nginx-v3
        EOF

    - name: Validar Rollout do Deployment
      run: |
        kubectl rollout status deployment/nginx-app-v3 --timeout=90s


        