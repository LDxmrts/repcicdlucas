name: Advanced CI/CD v2 - Key Vault Integration

on:
  push:
    branches:
      - main

env:
  AZURE_RESOURCE_GROUP: "rg-lab-cicd-v2"
  AZURE_CLUSTER_NAME: "aks-lab-cicd-v2"
  KEY_VAULT_NAME: "kv-lab-cicd-v2-2026" # Deve bater com o default do variables.tf
  TF_STATE_RG: "rg-terraform-state"
  TF_STATE_STORAGE: "stftstateactions2026" 
  TF_STATE_CONTAINER: "tfstate"
  TF_STATE_KEY: "terraform2.tfstate"
  IMAGE_NAME: "nginx-custom-v2"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ==========================================
  # JOB 1: PROVISIONAMENTO DA INFRAESTRUTURA
  # ==========================================
  infra-provisioning:
    name: Provisionamento com Terraform v2
    runs-on: ubuntu-latest
    outputs:
      acr_server: ${{ steps.tf-outputs.outputs.acr_server }}
      acr_username: ${{ steps.tf-outputs.outputs.acr_username }}

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configurar Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ env.TF_STATE_RG }}" \
          -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}" \
          -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
          -backend-config="key=${{ env.TF_STATE_KEY }}"
      working-directory: ./terraform2

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false
      working-directory: ./terraform2

    - name: Exportar Outputs Públicos
      id: tf-outputs
      run: |
        echo "acr_server=$(terraform output -raw acr_server)" >> $GITHUB_OUTPUT
        echo "acr_username=$(terraform output -raw acr_username)" >> $GITHUB_OUTPUT
      working-directory: ./terraform2

  # ==========================================
  # JOB 2: BUILD E SEGURANÇA (KEY VAULT + TRIVY)
  # ==========================================
  build-and-security:
    name: Build Docker & Scan com Trivy
    runs-on: ubuntu-latest
    needs: infra-provisioning
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # CAPTURA DE SEGREDOS: Puxa a senha do ACR direto do Key Vault criado no Job 1
    - name: Baixar Segredos do Azure Key Vault
      uses: azure/get-keyvault-secrets@v1
      with:
        keyvault: ${{ env.KEY_VAULT_NAME }}
        secrets: 'acr-admin-password'
      id: kv-secrets

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Gerar Dockerfile base (Nginx v2)
      run: |
        echo "FROM nginx:alpine" > Dockerfile
        echo "RUN echo '<h1>Lab 2: Arquitetura Enterprise com Key Vault e Trivy concluida!</h1>' > /usr/share/nginx/html/index.html" >> Dockerfile

    - name: Build local da imagem
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

    - name: Scan de Vulnerabilidades (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL'

    # Autenticação usando a senha extraída do cofre seguro em tempo de execução
    - name: Login no Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: ${{ needs.infra-provisioning.outputs.acr_server }}
        username: ${{ needs.infra-provisioning.outputs.acr_username }}
        password: ${{ steps.kv-secrets.outputs.acr-admin-password }}

    - name: Tag e Push da imagem para o ACR
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        docker push ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  # ==========================================
  # JOB 3: DEPLOY NO KUBERNETES (AKS)
  # ==========================================
  deploy-to-aks:
    name: Deploy no Azure AKS v2
    runs-on: ubuntu-latest
    needs: [infra-provisioning, build-and-security]
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configurar contexto do AKS
      uses: azure/aks-set-context@v4
      with:
        resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
        cluster-name: ${{ env.AZURE_CLUSTER_NAME }}

    - name: Implantar Manifestos no Cluster
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx-app-v2
          labels:
            app: nginx-v2
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: nginx-v2
          template:
            metadata:
              labels:
                app: nginx-v2
            spec:
              containers:
              - name: nginx-container
                image: ${{ needs.infra-provisioning.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: nginx-service-v2
        spec:
          type: LoadBalancer
          ports:
          - port: 80
            targetPort: 80
          selector:
            app: nginx-v2
        EOF

    - name: Validar Rollout do Deployment
      run: |
        kubectl rollout status deployment/nginx-app-v2 --timeout=90s
